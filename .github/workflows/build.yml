name: Build LaTeX PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-fonts-recommended \
                                   texlive-latex-extra fonts-noto-cjk

      - name: Compile PDF
        run: |
          xelatex TempExample.tex
          bibtex  TempExample
          xelatex TempExample.tex
          xelatex TempExample.tex

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: TempExample.pdf
          path: TempExample.pdf

      - name: Check for LaTeX errors
        run: |
          if grep -q "^l\." TempExample.log; then
            echo "LaTeX errors detected in log"
            exit 1
          fi
